name: .NET CI Pipeline

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    services:
      sqlserver:
        image: mcr.microsoft.com/mssql/server:2022-latest
        env:
          ACCEPT_EULA: "Y"
          SA_PASSWORD: "My_password123"
        ports:
          - 1433:1433

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'

    - name: Restore dependencies
      run: dotnet restore incedentAPI-RimaBouazra.slnx

    - name: Build project
      run: dotnet build incedentAPI-RimaBouazra.slnx --no-restore

    - name: Run tests
      env:
        ConnectionStrings__incidentsConnection: "Server=localhost,1433;Database=IncidentsDb;User Id=sa;Password=My_password123;TrustServerCertificate=True;"
      run: dotnet test incedentAPI-RimaBouazra.slnx --no-build --verbosity normal --logger "trx;LogFileName=TestResults.trx"

    - name: Upload test report
      uses: actions/upload-artifact@v4
      with:
        name: test-report
        path: '**/TestResults.trx'