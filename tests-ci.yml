# .github/workflows/tests-ci.yml
name: .NET CI Pipeline

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build-and-test:
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'

    - name: Restore dependencies
      run: dotnet restore incedentAPI-RimaBouazra.slnx

    - name: Build solution
      run: dotnet build incedentAPI-RimaBouazra.slnx --no-restore

    - name: Run tests
      run: dotnet test incedentAPI-RimaBouazra.slnx --no-build --verbosity normal